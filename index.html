  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html {\n    font-size: 16px;\n    -webkit-text-size-adjust: 100%;\n  }\n\n  body {\n    font-family: \"游ゴシック\", \"Yu Gothic\", \"Noto Sans JP\", \"Hiragino Kaku Gothic ProN\", \"メイリオ\", Meiryo, sans-serif;\n    background: #F8FAFE;\n    color: #333;\n    line-height: 1.8;\n    padding: 0;\n  }\n\n  /* ========== レイアウト ========== */\n  .wrapper {\n    max-width: 800px;\n    margin: 0 auto;\n    padding: 24px 20px 48px;\n  }\n\n  /* ========== ヘッダー ========== */\n  .site-header {\n    background: linear-gradient(135deg, #4A90D9 0%, #6BA8E8 100%);\n    color: #fff;\n    border-radius: 16px;\n    padding: 32px 28px 28px;\n    margin-bottom: 32px;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .site-header::after {\n    content: \"\";\n    position: absolute;\n    top: -30px;\n    right: -30px;\n    width: 120px;\n    height: 120px;\n    background: rgba(255,255,255,0.08);\n    border-radius: 50%;\n    pointer-events: none;\n  }\n\n  .header-org {\n    font-size: 0.7rem;\n    text-align: right;\n    opacity: 0.85;\n    margin-bottom: 12px;\n    position: relative;\n    z-index: 1;\n  }\n\n  .header-title {\n    font-size: 1.55rem;\n    font-weight: 700;\n    letter-spacing: 0.03em;\n    margin-bottom: 8px;\n  }\n\n  .header-sub {\n    font-size: 0.88rem;\n    opacity: 0.92;\n    font-weight: 400;\n  }\n\n  /* ========== セクション見出し ========== */\n  .section-heading {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    font-size: 1.2rem;\n    font-weight: 700;\n    color: #2C3E50;\n    margin: 36px 0 18px;\n    padding-bottom: 8px;\n    border-bottom: 2px solid #D6E6F5;\n  }\n\n  .section-badge {\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    font-size: 0.78rem;\n    font-weight: 700;\n    color: #fff;\n    padding: 4px 12px;\n    border-radius: 20px;\n    letter-spacing: 0.02em;\n    white-space: nowrap;\n  }\n\n  .badge-copilot {\n    background: linear-gradient(135deg, #4A90D9, #357ABD);\n  }\n\n  .badge-notebooklm {\n    background: linear-gradient(135deg, #5B9F4A, #4A8F3A);\n  }\n\n  /* ========== 基本の型カード ========== */\n  .steps-container {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 14px;\n    margin-bottom: 8px;\n  }\n\n  .step-card {\n    background: #fff;\n    border: 1.5px solid #D6E6F5;\n    border-radius: 14px;\n    padding: 20px 16px;\n    text-align: center;\n    transition: box-shadow 0.2s ease;\n  }\n\n  .step-card:hover {\n    box-shadow: 0 4px 16px rgba(74, 144, 217, 0.12);\n  }\n\n  .step-number {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 36px;\n    height: 36px;\n    background: #4A90D9;\n    color: #fff;\n    border-radius: 50%;\n    font-size: 0.95rem;\n    font-weight: 700;\n    margin-bottom: 10px;\n  }\n\n  .step-label {\n    font-weight: 700;\n    font-size: 0.92rem;\n    color: #2C3E50;\n    margin-bottom: 6px;\n  }\n\n  .step-example {\n    font-size: 0.82rem;\n    color: #666;\n    line-height: 1.6;\n  }\n\n  /* ========== プロンプトカード ========== */\n  .prompt-card {\n    background: #fff;\n    border: 1.5px solid #D6E6F5;\n    border-radius: 14px;\n    padding: 0;\n    margin-bottom: 20px;\n    overflow: hidden;\n    transition: box-shadow 0.2s ease;\n  }\n\n  .prompt-card:hover {\n    box-shadow: 0 4px 18px rgba(74, 144, 217, 0.10);\n  }\n\n  .prompt-header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 14px 18px;\n    background: #F0F6FD;\n    border-bottom: 1px solid #E3EDF7;\n  }\n\n  .prompt-use {\n    font-size: 0.95rem;\n    font-weight: 700;\n    color: #2C3E50;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n  }\n\n  .prompt-use-icon {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 26px;\n    height: 26px;\n    background: #4A90D9;\n    color: #fff;\n    border-radius: 8px;\n    font-size: 0.75rem;\n    font-weight: 700;\n    flex-shrink: 0;\n  }\n\n  .copy-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 5px;\n    background: #4A90D9;\n    color: #fff;\n    border: none;\n    border-radius: 8px;\n    padding: 7px 14px;\n    font-size: 0.78rem;\n    font-weight: 600;\n    cursor: pointer;\n    transition: background 0.2s ease, transform 0.1s ease;\n    white-space: nowrap;\n    font-family: inherit;\n  }\n\n  .copy-btn:hover {\n    background: #357ABD;\n  }\n\n  .copy-btn:active {\n    transform: scale(0.96);\n  }\n\n  .copy-btn.copied {\n    background: #27AE60;\n  }\n\n  .copy-btn-icon {\n    font-size: 0.85rem;\n  }\n\n  .prompt-body {\n    padding: 18px 20px;\n    position: relative;\n  }\n\n  .prompt-text {\n    font-size: 0.88rem;\n    line-height: 1.9;\n    white-space: pre-wrap;\n    color: #444;\n  }\n\n  .prompt-text .var-highlight {\n    color: #E67E22;\n    font-weight: 600;\n  }\n\n  .prompt-note {\n    margin-top: 14px;\n    padding: 10px 14px;\n    background: #FFF9F0;\n    border-left: 3px solid #E67E22;\n    border-radius: 0 8px 8px 0;\n    font-size: 0.78rem;\n    color: #8B6914;\n    line-height: 1.7;\n  }\n\n  /* ========== PDF保存バー ========== */\n  .print-bar {\n    background: linear-gradient(135deg, #2C3E50, #34495E);\n    padding: 12px 20px;\n    position: sticky;\n    top: 0;\n    z-index: 100;\n  }\n\n  .print-bar-inner {\n    max-width: 800px;\n    margin: 0 auto;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 12px;\n  }\n\n  .print-bar-text {\n    color: rgba(255,255,255,0.85);\n    font-size: 0.82rem;\n  }\n\n  .print-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    background: #E74C3C;\n    color: #fff;\n    border: none;\n    border-radius: 8px;\n    padding: 10px 20px;\n    font-size: 0.85rem;\n    font-weight: 700;\n    cursor: pointer;\n    transition: background 0.2s ease, transform 0.1s ease;\n    white-space: nowrap;\n    font-family: inherit;\n  }\n\n  .print-btn:hover {\n    background: #C0392B;\n  }\n\n  .print-btn:active {\n    transform: scale(0.97);\n  }\n\n  @media (max-width: 600px) {\n    .print-bar {\n      padding: 10px 14px;\n    }\n\n    .print-bar-text {\n      font-size: 0.75rem;\n    }\n\n    .print-btn {\n      padding: 8px 14px;\n      font-size: 0.78rem;\n    }\n  }\n\n  /* ========== フッター ========== */\n  .site-footer {\n    margin-top: 40px;\n    padding: 24px;\n    background: #FFF5F5;\n    border: 1.5px solid #F5D5D5;\n    border-radius: 14px;\n    text-align: center;\n  }\n\n  .footer-warning {\n    font-size: 0.9rem;\n    font-weight: 700;\n    color: #C0392B;\n    margin-bottom: 10px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 6px;\n  }\n\n  .footer-tip {\n    font-size: 0.82rem;\n    color: #666;\n    line-height: 1.7;\n  }\n\n  /* ========== レスポンシブ ========== */\n  @media (max-width: 600px) {\n    .wrapper {\n      padding: 16px 12px 36px;\n    }\n\n    .site-header {\n      padding: 24px 18px 22px;\n      border-radius: 12px;\n    }\n\n    .header-title {\n      font-size: 1.25rem;\n    }\n\n    .header-sub {\n      font-size: 0.8rem;\n    }\n\n    .steps-container {\n      grid-template-columns: 1fr;\n      gap: 10px;\n    }\n\n    .step-card {\n      display: flex;\n      align-items: center;\n      gap: 14px;\n      text-align: left;\n      padding: 16px;\n    }\n\n    .step-number {\n      margin-bottom: 0;\n      flex-shrink: 0;\n    }\n\n    .step-content {\n      flex: 1;\n    }\n\n    .prompt-header {\n      flex-wrap: wrap;\n      gap: 10px;\n      padding: 12px 14px;\n    }\n\n    .prompt-body {\n      padding: 14px 16px;\n    }\n\n    .prompt-text {\n      font-size: 0.84rem;\n    }\n\n    .section-heading {\n      font-size: 1.05rem;\n      flex-wrap: wrap;\n    }\n  }\n\n  /* ========== 印刷用 ========== */\n  @media print {\n    @page {\n      size: A4;\n      margin: 12mm 14mm;\n    }\n\n    body {\n      background: #fff;\n      color: #000;\n      font-size: 9.5pt;\n      line-height: 1.5;\n      -webkit-print-color-adjust: exact;\n      print-color-adjust: exact;\n    }\n\n    .wrapper {\n      max-width: 100%;\n      padding: 0;\n    }\n\n    /* --- 印刷時に非表示 --- */\n    .copy-btn,\n    .print-bar {\n      display: none !important;\n    }\n\n    /* --- ヘッダー --- */\n    .site-header {\n      background: #4A90D9 !important;\n      color: #fff !important;\n      border: none;\n      border-radius: 8px;\n      padding: 14px 18px 12px;\n      margin-bottom: 16px;\n      page-break-after: avoid;\n    }\n\n    .site-header::after {\n      display: none;\n    }\n\n    .header-org {\n      color: #fff;\n      opacity: 0.9;\n      font-size: 7pt;\n      margin-bottom: 6px;\n    }\n\n    .header-title {\n      font-size: 15pt;\n      margin-bottom: 4px;\n    }\n\n    .header-sub {\n      color: #fff;\n      opacity: 0.9;\n      font-size: 8.5pt;\n    }\n\n    /* --- セクション見出し --- */\n    .section-heading {\n      font-size: 11pt;\n      margin: 14px 0 8px;\n      padding-bottom: 4px;\n      border-bottom: 1.5px solid #999;\n      page-break-after: avoid;\n    }\n\n    .section-badge {\n      font-size: 7pt;\n      padding: 2px 8px;\n    }\n\n    .badge-copilot {\n      background: #4A90D9 !important;\n    }\n\n    .badge-notebooklm {\n      background: #5B9F4A !important;\n    }\n\n    /* --- 基本の型カード --- */\n    .steps-container {\n      grid-template-columns: repeat(3, 1fr);\n      gap: 8px;\n      margin-bottom: 4px;\n    }\n\n    .step-card {\n      border: 1px solid #999;\n      border-radius: 6px;\n      padding: 10px 8px;\n      page-break-inside: avoid;\n    }\n\n    .step-number {\n      width: 26px;\n      height: 26px;\n      font-size: 8pt;\n      background: #4A90D9 !important;\n      margin-bottom: 4px;\n    }\n\n    .step-label {\n      font-size: 8.5pt;\n      margin-bottom: 2px;\n    }\n\n    .step-example {\n      font-size: 7.5pt;\n    }\n\n    /* --- プロンプトカード --- */\n    .prompt-card {\n      border: 1px solid #999;\n      border-radius: 6px;\n      margin-bottom: 10px;\n      page-break-inside: avoid;\n      box-shadow: none;\n    }\n\n    .prompt-header {\n      background: #EDF2F7 !important;\n      border-bottom: 1px solid #ccc;\n      padding: 8px 12px;\n    }\n\n    .prompt-use {\n      font-size: 9pt;\n    }\n\n    .prompt-use-icon {\n      width: 20px;\n      height: 20px;\n      font-size: 7pt;\n      border-radius: 5px;\n      background: #4A90D9 !important;\n    }\n\n    .prompt-body {\n      padding: 10px 14px;\n    }\n\n    .prompt-text {\n      font-size: 8.5pt;\n      line-height: 1.65;\n    }\n\n    .prompt-text .var-highlight {\n      color: #C0392B;\n      text-decoration: underline;\n      font-weight: 700;\n    }\n\n    .prompt-note {\n      margin-top: 8px;\n      padding: 6px 10px;\n      font-size: 7.5pt;\n      border-left: 2px solid #E67E22;\n      background: #FFF9F0 !important;\n    }\n\n    /* --- フッター --- */\n    .site-footer {\n      margin-top: 16px;\n      padding: 12px 16px;\n      border: 1.5px solid #C0392B;\n      border-radius: 6px;\n      background: #FFF5F5 !important;\n    }\n\n    .footer-warning {\n      font-size: 9pt;\n      color: #C0392B;\n    }\n\n    .footer-tip {\n      font-size: 8pt;\n    }\n\n    a {\n      color: #000;\n      text-decoration: none;\n    }\n  }\n\u003C/style>\n\u003C/head>\n\u003Cbody>\n\n\u003C!-- ===== PDF保存バー ===== -->\n\u003Cdiv class=\"print-bar\">\n  \u003Cdiv class=\"print-bar-inner\">\n    \u003Cspan class=\"print-bar-text\">📄 このページをPDFとして保存できます\u003C/span>\n    \u003Cbutton class=\"print-btn\" onclick=\"window.print()\">\n      🖨️ PDFとして保存 / 印刷\n    \u003C/button>\n  \u003C/div>\n\u003C/div>\n\n\u003Cdiv class=\"wrapper\">\n\n  \u003C!-- ===== ヘッダー ===== -->\n  \u003Cheader class=\"site-header\">\n    \u003Cdiv class=\"header-org\">北海道公立小中学校事務職員協議会 苫小牧市支部\u003C/div>\n    \u003Ch1 class=\"header-title\">学校事務職員のための AIプロンプト集\u003C/h1>\n    \u003Cp class=\"header-sub\">〔○○〕を書き換えるだけ！ コピーしてそのまま使えます\u003C/p>\n  \u003C/header>\n\n  \u003C!-- ===== 基本の型セクション ===== -->\n  \u003Ch2 class=\"section-heading\">📐 プロンプトの基本の型\u003C/h2>\n\n  \u003Cdiv class=\"steps-container\">\n    \u003Cdiv class=\"step-card\">\n      \u003Cdiv class=\"step-number\">①\u003C/div>\n      \u003Cdiv class=\"step-content\">\n        \u003Cdiv class=\"step-label\">役割を与える\u003C/div>\n        \u003Cdiv class=\"step-example\">「あなたは○○です」\u003C/div>\n      \u003C/div>\n    \u003C/div>\n    \u003Cdiv class=\"step-card\">\n      \u003Cdiv class=\"step-number\">②\u003C/div>\n      \u003Cdiv class=\"step-content\">\n        \u003Cdiv class=\"step-label\">具体的に伝える\u003C/div>\n        \u003Cdiv class=\"step-example\">誰に・何を・何のために\u003Cbr>どんな口調で\u003C/div>\n      \u003C/div>\n    \u003C/div>\n    \u003Cdiv class=\"step-card\">\n      \u003Cdiv class=\"step-number\">③\u003C/div>\n      \u003Cdiv class=\"step-content\">\n        \u003Cdiv class=\"step-label\">出力形式を指定\u003C/div>\n        \u003Cdiv class=\"step-example\">「箇条書きで」「表形式で」\u003Cbr>「200字で」\u003C/div>\n      \u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- ===== Copilot セクション ===== -->\n  \u003Ch2 class=\"section-heading\">\n    \u003Cspan class=\"section-badge badge-copilot\">✦ Copilot\u003C/span>\n    Copilot で使う\n  \u003C/h2>\n\n  \u003C!-- プロンプト1 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">1\u003C/span>\n        教職員向けの周知文作成\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">あなたは学校事務職員です。\n以下の内容を教職員向けに周知する文書を作成してください。\n・周知する内容：\u003Cspan class=\"var-highlight\">〔○○（例：健康診断の日程変更）〕\u003C/span>\n・対象：\u003Cspan class=\"var-highlight\">〔○○（例：全教職員／該当者のみ）〕\u003C/span>\n・期限や締切：\u003Cspan class=\"var-highlight\">〔○○（例：3月10日まで）〕\u003C/span>\n・口調：簡潔で丁寧に\n・形式：A4・1枚に収まる分量で\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- プロンプト2 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">2\u003C/span>\n        新任職員への引き継ぎ資料作成\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">あなたは学校事務の経験が豊富なベテラン職員です。\n以下の業務について、新任事務職員向けの引き継ぎ資料を作成してください。\n・業務名：\u003Cspan class=\"var-highlight\">〔○○（例：就学援助事務）〕\u003C/span>\n・業務の時期：\u003Cspan class=\"var-highlight\">〔○○（例：毎年4月〜6月）〕\u003C/span>\n・特に注意すべきこと：\u003Cspan class=\"var-highlight\">〔○○（例：申請書の押印漏れが多い）〕\u003C/span>\n・形式：手順を番号つきで、注意点は目立つように分けて書いてください\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- ===== NotebookLM セクション ===== -->\n  \u003Ch2 class=\"section-heading\">\n    \u003Cspan class=\"section-badge badge-notebooklm\">📓 NotebookLM\u003C/span>\n    NotebookLM で使う\n  \u003C/h2>\n\n  \u003C!-- プロンプト3 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">3\u003C/span>\n        通知文書をやさしい言葉で要約\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">この通知の内容を、高校生でもわかるようにやさしい言葉で要約してください。\n専門用語や法令用語が出てきた場合は、かっこ書きでかみ砕いた説明を添えてください。\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- プロンプト4 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">4\u003C/span>\n        通知文書から自分のアクションを抽出\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">私は学校事務職員です。\nこの通知を読んで、学校事務職員として自分がやらなければならないことだけを箇条書きで抜き出してください。管理職や教員が行うことは除いてください。\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- プロンプト5 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">5\u003C/span>\n        通知文書から期限つきタスクを時系列整理\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">この通知の中で、期限や締切が定められている項目をすべて抜き出してください。\n表形式で、以下の列で整理してください。\n・期限日（早い順）・やること・届出先／提出先・備考（注意点があれば）\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- プロンプト6 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">6\u003C/span>\n        会議音声から議事録を作成\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">アップロードした音声は\u003Cspan class=\"var-highlight\">〔○○（例：第3回職員会議）〕\u003C/span>の録音データです。\n以下の形式で議事録を作成してください。\n・会議名：\u003Cspan class=\"var-highlight\">〔○○〕\u003C/span>\n・日時：\u003Cspan class=\"var-highlight\">〔○○〕\u003C/span>\n・出席者：\u003Cspan class=\"var-highlight\">〔○○（わかれば）〕\u003C/span>\n・形式：議題ごとに「要旨」「決定事項」「次回までの宿題」を分けて整理してください\n・口調：配布用の公式な文書として丁寧に\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- プロンプト7 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">7\u003C/span>\n        市経理Excelデータの分析→報告文書作成\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">アップロードしたExcelデータは\u003Cspan class=\"var-highlight\">〔○○（例：令和7年度の市経理執行状況）〕\u003C/span>です。\nこのデータを分析し、教職員に配布するための報告文書を作成してください。\n・報告のポイント：\u003Cspan class=\"var-highlight\">〔○○（例：予算残額と今後の見通し）〕\u003C/span>\n・形式：A4・1枚に収まる分量で、冒頭に要点をまとめ、その後に詳細を書いてください\n・口調：教職員全員が読む前提で、わかりやすく丁寧に\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- プロンプト8 -->\n  \u003Cdiv class=\"prompt-card\">\n    \u003Cdiv class=\"prompt-header\">\n      \u003Cdiv class=\"prompt-use\">\n        \u003Cspan class=\"prompt-use-icon\">8\u003C/span>\n        やることリストを整理してチェックリスト化\n      \u003C/div>\n      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n      \u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"prompt-body\">\n      \u003Cdiv class=\"prompt-text\">アップロードしたファイルは、\u003Cspan class=\"var-highlight\">〔○○（例：年度末・年度初めの事務作業）〕\u003C/span>について自分で書き出したやることリストです。\nこれを以下の形式で整理してください。\n・時系列順に並べ替え\n・チェックボックスつきのリスト形式\n・漏れやすい作業には注意マークをつけてください\n・期限があるものは期限も明記してください\u003C/div>\n      \u003Cdiv class=\"prompt-note\">※ 事前にWordなどで「やること」をざっくり書き出してアップロードしてから使ってください\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- ===== フッター ===== -->\n  \u003Cfooter class=\"site-footer\">\n    \u003Cdiv class=\"footer-warning\">⚠ 個人情報・機密情報は絶対にAIに入力しないでください\u003C/div>\n    \u003Cp class=\"footer-tip\">〔○○〕の部分を自分の業務に合わせて書き換えて使ってください\u003C/p>\n  \u003C/footer>\n\n\u003C/div>\n\n\u003Cscript>\nfunction copyPrompt(btn) {\n  // プロンプトカード内の .prompt-text からプレーンテキストを取得\n  var card = btn.closest('.prompt-card');\n  var textEl = card.querySelector('.prompt-text');\n\n  // innerTextでプレーンテキストとして取得（HTMLタグを除去）\n  var text = textEl.innerText;\n\n  // クリップボードにコピー\n  if (navigator.clipboard && navigator.clipboard.writeText) {\n    navigator.clipboard.writeText(text).then(function() {\n      showCopied(btn);\n    }).catch(function() {\n      fallbackCopy(text, btn);\n    });\n  } else {\n    fallbackCopy(text, btn);\n  }\n}\n\nfunction fallbackCopy(text, btn) {\n  var ta = document.createElement('textarea');\n  ta.value = text;\n  ta.style.position = 'fixed';\n  ta.style.left = '-9999px';\n  ta.style.top = '-9999px';\n  document.body.appendChild(ta);\n  ta.focus();\n  ta.select();\n  try {\n    document.execCommand('copy');\n    showCopied(btn);\n  } catch (e) {\n    alert('コピーに失敗しました。手動でコピーしてください。');\n  }\n  document.body.removeChild(ta);\n}\n\nfunction showCopied(btn) {\n  var label = btn.querySelector('.copy-btn-label');\n  var icon = btn.querySelector('.copy-btn-icon');\n  var origLabel = label.textContent;\n  var origIcon = icon.textContent;\n\n  label.textContent = 'コピーしました！';\n  icon.textContent = '✅';\n  btn.classList.add('copied');\n\n  setTimeout(function() {\n    label.textContent = origLabel;\n    icon.textContent = origIcon;\n    btn.classList.remove('copied');\n  }, 2000);\n}\n\u003C/script>\n\n\u003C/body>\n\u003C/html>\n",{"created_at":33,"updated_at":34},1772418826059,1772419123532,{"file_path":36,"content":37,"is_binary":23,"metadata":38},"README.md","# 学校事務職員のための AIプロンプト集\n\n> 〔○○〕を書き換えるだけ！ コピーしてそのまま使えるプロンプト集チートシート\n\n**北海道公立小中学校事務職員協議会 苫小牧市支部**\n\n---\n\n## 📖 概要\n\n学校事務職員が日常業務で **Copilot** や **NotebookLM** を活用するためのプロンプト集です。  \n各プロンプトの横にある「コピー」ボタンをクリックするだけで、すぐにAIに貼り付けて使えます。\n\n- 💡 `〔○○〕` の部分を自分の業務に合わせて書き換えるだけでOK\n- 📋 ワンクリックでクリップボードにコピー\n- 🖨️ PDFとして保存・印刷にも対応\n- 📱 スマートフォンでも閲覧可能\n\n## 📝 収録プロンプト（全8件）\n\n### Copilot で使う\n| # | 用途 |\n|---|------|\n| 1 | 教職員向けの周知文作成 |\n| 2 | 新任職員への引き継ぎ資料作成 |\n\n### NotebookLM で使う\n| # | 用途 |\n|---|------|\n| 3 | 通知文書をやさしい言葉で要約 |\n| 4 | 通知文書から自分のアクションを抽出 |\n| 5 | 通知文書から期限つきタスクを時系列整理 |\n| 6 | 会議音声から議事録を作成 |\n| 7 | 市経理Excelデータの分析→報告文書作成 |\n| 8 | やることリストを整理してチェックリスト化 |\n\n## 🚀 使い方\n\n### 方法1：GitHub Pages で公開する\n\n1. このリポジトリを Fork または Clone\n2. リポジトリの **Settings** → **Pages** → Source を `main` / `/ (root)` に設定\n3. 数分後に `https://\u003Cユーザー名>.github.io/\u003Cリポジトリ名>/` でアクセス可能に\n\n### 方法2：ローカルで使う\n\n1. `index.html` をダウンロード\n2. ブラウザで開くだけ（サーバー不要・外部ライブラリ不要）\n\n### 方法3：PDF化して配布する\n\n1. `index.html` をブラウザで開く\n2. ページ上部の **「🖨️ PDFとして保存 / 印刷」** ボタンをクリック\n3. 送信先を **「PDFに保存」** に変更して保存\n\n> 💡 Chrome の場合「詳細設定」→「背景のグラフィック」にチェックを入れると、ヘッダーの青色やバッジの色がきれいに反映されます。\n\n## 📁 ファイル構成\n\n```\n.\n├── index.html   ← 本体（CSS・JS込みの単一ファイル）\n├── README.md    ← このファイル\n├── LICENSE      ← MITライセンス\n└── .gitignore\n```\n\n## 🛠 技術仕様\n\n- **単一HTMLファイル** で完結（外部CDN・ライブラリ不使用）\n- CSS・JavaScript はすべてインライン記述\n- Clipboard API + fallback（execCommand）によるコピー機能\n- `@media print` による印刷・PDF保存最適化（A4サイズ対応）\n- レスポンシブ対応（600px以下でモバイルレイアウト）\n\n## ⚠️ 注意事項\n\n- **個人情報・機密情報は絶対にAIに入力しないでください**\n- プロンプト内の `〔○○〕` はあくまで例です。実際の業務内容に合わせて書き換えてください\n\n## 📄 ライセンス\n\n[MIT License](./LICENSE)\n\n---\n\n\u003Cp align=\"center\">\n  \u003Cstrong>北海道公立小中学校事務職員協議会 苫小牧市支部\u003C/strong>\n\u003C/p>\n",{"created_at":39,"updated_at":40},1772418870550,1772419303115,{"file_path":42,"content":43,"is_binary":23,"metadata":44},"LICENSE","MIT License\n\nCopyright (c) 2026 北海道公立小中学校事務職員協議会 苫小牧市支部\n\nPermission is hereby granted, free of charge, to any person obtaining a copy\nof this software and associated documentation files (the \"Software\"), to deal\nin the Software without restriction, including without limitation the rights\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the Software is\nfurnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE\nSOFTWARE.\n",{"created_at":45,"updated_at":45},1772419308164,{"file_path":47,"content":48,"is_binary":23,"metadata":49},".gitignore","# OS files\n.DS_Store\nThumbs.db\nDesktop.ini\n\n# Editor files\n.vscode/\n.idea/\n*.swp\n*.swo\n*~\n\n# Logs\n*.log\n",{"created_at":50,"updated_at":50},1772419311808,{"project_id":14,"created_at":52,"website_name":21,"deployment_urls":53},"2026-03-02T02:31:06.968933",[],[55,60,64,68,72,76,80],{"id":56,"name":57,"ctime":58,"mtime":59},"14a14e64-8d13-4146-8135-a5162cb73344","以下の仕様で、単一のHTMLファイル（CSS・JavaScr","2026-03-02T03:01:42.361345","2026-03-02 03:01:42.361368",{"id":61,"name":57,"ctime":62,"mtime":63},"9ebd5737-86ad-4cdd-8db4-6cbab03eb203","2026-03-02T02:57:38.769879","2026-03-02 02:57:38.769922",{"id":65,"name":57,"ctime":66,"mtime":67},"5a126ab9-f67c-4b66-9bbd-6417f264b87b","2026-03-02T02:44:53.623418","2026-03-02 02:44:53.623448",{"id":69,"name":57,"ctime":70,"mtime":71},"605d312b-2f21-426e-84df-a03e572185d0","2026-03-02T02:41:12.576148","2026-03-02 02:41:12.576168",{"id":73,"name":57,"ctime":74,"mtime":75},"3ab0824c-8c1e-4638-91b5-af021c5f05e3","2026-03-02T02:37:54.774475","2026-03-02 02:37:54.774500",{"id":77,"name":57,"ctime":78,"mtime":79},"d8dbb06e-64e9-4001-8c63-6060b43205db","2026-03-02T02:37:18.458945","2026-03-02 02:37:18.458969",{"id":81,"name":57,"ctime":82,"mtime":83},"784a1318-a2d0-4414-bcad-2555b3fc2fef","2026-03-02T02:32:15.693611","2026-03-02 02:32:15.693633",[85,90,111,140,156,162,177,196,212,220,236,251,266,272,287,300,312,316,327,331,348,352,368,386,402,417,432,447,462,470,484,488,503,515,526,530,546,568,583,589,604,610,625,630,645,664,680,683,698,711,722,726,737,741,751,755],{"id":86,"role":87,"content":88,"action":17,"recommend_actions":17,"is_prompt":23,"render_template":17,"session_state":17,"system_reminder":17,"message_type":17,"tool_calls":17,"tool_call_id":17,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"reasoning_content":17,"cogen_id":17,"ctime":89},"87af9b29-937f-4955-a62d-12d48c612d03","user","以下の仕様で、単一のHTMLファイル（CSS・JavaScript込み）を作成してください。\n\n【概要】\n学校事務職員向けの「AIプロンプト集チートシート」をWebページとして作成する。\n各プロンプトの横に「コピー」ボタンがあり、ワンクリックでクリップボードにコピーできる。\n\n【デザイン要件】\n・やわらかく親しみやすい雰囲気（角丸・やさしい配色）\n・メインカラー：やわらかいブルー系（#4A90D9 程度）\n・背景：白ベース（#F8FAFE 程度の薄い青みがかった白）\n・フォント：sans-serif（游ゴシック、Noto Sans JP など）\n・最大幅800pxの中央寄せレイアウト\n・スマホでも崩れない程度のレスポンシブ対応\n\n【ページ構成】\n\n＝＝＝ ヘッダー ＝＝＝\n・タイトル：「学校事務職員のための AIプロンプト集」\n・サブタイトル：「〔○○〕を書き換えるだけ！ コピーしてそのまま使えます」\n・右上に小さく「北海道公立小中学校事務職員協議会 苫小牧市支部」\n\n＝＝＝ 基本の型セクション ＝＝＝\n見出し：「プロンプトの基本の型」\n3つのステップを横並びのカード風に表示：\n  ① 役割を与える →「あなたは○○です」\n  ② 具体的に伝える → 誰に・何を・何のために・どんな口調で\n  ③ 出力形式を指定 →「箇条書きで」「表形式で」「200字で」\n\n＝＝＝ Copilotセクション ＝＝＝\nセクション見出し：「Copilot で使う」（アイコンかラベルで目立たせる）\n\nプロンプト1つ目：\n用途見出し：「教職員向けの周知文作成」\nプロンプト本文：\nあなたは学校事務職員です。\n以下の内容を教職員向けに周知する文書を作成してください。\n・周知する内容：〔○○（例：健康診断の日程変更）〕\n・対象：〔○○（例：全教職員／該当者のみ）〕\n・期限や締切：〔○○（例：3月10日まで）〕\n・口調：簡潔で丁寧に\n・形式：A4・1枚に収まる分量で\n\nプロンプト2つ目：\n用途見出し：「新任職員への引き継ぎ資料作成」\nプロンプト本文：\nあなたは学校事務の経験が豊富なベテラン職員です。\n以下の業務について、新任事務職員向けの引き継ぎ資料を作成してください。\n・業務名：〔○○（例：就学援助事務）〕\n・業務の時期：〔○○（例：毎年4月〜6月）〕\n・特に注意すべきこと：〔○○（例：申請書の押印漏れが多い）〕\n・形式：手順を番号つきで、注意点は目立つように分けて書いてください\n\n＝＝＝ NotebookLMセクション ＝＝＝\nセクション見出し：「NotebookLM で使う」（アイコンかラベルで目立たせる）\n\nプロンプト3つ目：\n用途見出し：「通知文書をやさしい言葉で要約」\nプロンプト本文：\nこの通知の内容を、高校生でもわかるようにやさしい言葉で要約してください。\n専門用語や法令用語が出てきた場合は、かっこ書きでかみ砕いた説明を添えてください。\n\nプロンプト4つ目：\n用途見出し：「通知文書から自分のアクションを抽出」\nプロンプト本文：\n私は学校事務職員です。\nこの通知を読んで、学校事務職員として自分がやらなければならないことだけを箇条書きで抜き出してください。管理職や教員が行うことは除いてください。\n\nプロンプト5つ目：\n用途見出し：「通知文書から期限つきタスクを時系列整理」\nプロンプト本文：\nこの通知の中で、期限や締切が定められている項目をすべて抜き出してください。\n表形式で、以下の列で整理してください。\n・期限日（早い順）・やること・届出先／提出先・備考（注意点があれば）\n\nプロンプト6つ目：\n用途見出し：「会議音声から議事録を作成」\nプロンプト本文：\nアップロードした音声は〔○○（例：第3回職員会議）〕の録音データです。\n以下の形式で議事録を作成してください。\n・会議名：〔○○〕\n・日時：〔○○〕\n・出席者：〔○○（わかれば）〕\n・形式：議題ごとに「要旨」「決定事項」「次回までの宿題」を分けて整理してください\n・口調：配布用の公式な文書として丁寧に\n\nプロンプト7つ目：\n用途見出し：「市経理Excelデータの分析→報告文書作成」\nプロンプト本文：\nアップロードしたExcelデータは〔○○（例：令和7年度の市経理執行状況）〕です。\nこのデータを分析し、教職員に配布するための報告文書を作成してください。\n・報告のポイント：〔○○（例：予算残額と今後の見通し）〕\n・形式：A4・1枚に収まる分量で、冒頭に要点をまとめ、その後に詳細を書いてください\n・口調：教職員全員が読む前提で、わかりやすく丁寧に\n\nプロンプト8つ目：\n用途見出し：「やることリストを整理してチェックリスト化」\nプロンプト本文：\nアップロードしたファイルは、〔○○（例：年度末・年度初めの事務作業）〕について自分で書き出したやることリストです。\nこれを以下の形式で整理してください。\n・時系列順に並べ替え\n・チェックボックスつきのリスト形式\n・漏れやすい作業には注意マークをつけてください\n・期限があるものは期限も明記してください\n注釈（プロンプト枠の外に小さく表示）：※事前にWordなどで「やること」をざっくり書き出してアップロードしてから使ってください\n\n＝＝＝ フッター ＝＝＝\n⚠ 個人情報・機密情報は絶対にAIに入力しないでください\n〔○○〕の部分を自分の業務に合わせて書き換えて使ってください\n\n【コピーボタンの仕様】\n・各プロンプトの右上に「コピー」ボタンを配置\n・クリックするとそのプロンプト本文だけがクリップボードにコピーされる\n・コピー成功時、ボタンのテキストが一瞬「コピーしました！」に変わり、2秒後に元に戻る\n・変数の〔○○〕部分もそのままコピーされるようにする（ユーザーが貼り付け後に書き換える）\n\n【変数〔○○〕の表示】\n・プロンプト本文中の〔○○（例：〜）〕はオレンジ系の色（#E67E22 程度）で強調表示する\n・ただしコピー時はプレーンテキストとしてコピーされる\n\n【その他】\n・外部CDN等は使わず、単一HTMLファイルで完結させる\n・JavaScriptもHTML内にインラインで記述\n・印刷しても見やすいように、@media print で不要な装飾を落とすCSS","2026-03-02T02:32:15.693644",{"id":91,"role":92,"content":93,"action":17,"recommend_actions":17,"is_prompt":23,"render_template":17,"session_state":94,"system_reminder":17,"message_type":17,"tool_calls":104,"tool_call_id":17,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"reasoning_content":17,"cogen_id":17,"ctime":17},"7ff886d0-5a64 y {\\n    font-family: \\\"游ゴシック\\\", \\\"Yu Gothic\\\", \\\"Noto Sans JP\\\", \\\"Hiragino Kaku Gothic ProN\\\", \\\"メイリオ\\\", Meiryo, sans-serif;\\n    background: #F8FAFE;\\n    color: #333;\\n    line-height: 1.8;\\n    padding: 0;\\n  }\\n\\n  /* ========== レイアウト ========== */\\n  .wrapper {\\n    max-width: 800px;\\n    margin: 0 auto;\\n    padding: 24px 20px 48px;\\n  }\\n\\n  /* ========== ヘッダー ========== */\\n  .site-header {\\n    background: linear-gradient(135deg, #4A90D9 0%, #6BA8E8 100%);\\n    color: #fff;\\n    border-radius: 16px;\\n    padding: 32px 28px 28px;\\n    margin-bottom: 32px;\\n    position: relative;\\n    overflow: hidden;\\n  }\\n\\n  .site-header::after {\\n    content: \\\"\\\";\\n    position: absolute;\\n    top: -30px;\\n    right: -30px;\\n    width: 120px;\\n    height: 120px;\\n    background: rgba(255,255,255,0.08);\\n    border-radius: 50%;\\n    pointer-events: none;\\n  }\\n\\n  .header-org {\\n    font-size: 0.7rem;\\n    text-align: right;\\n    opacity: 0.85;\\n    margin-bottom: 12px;\\n    position: relative;\\n    z-index: 1;\\n  }\\n\\n  .header-title {\\n    font-size: 1.55rem;\\n    font-weight: 700;\\n    letter-spacing: 0.03em;\\n    margin-bottom: 8px;\\n  }\\n\\n  .header-sub {\\n    font-size: 0.88rem;\\n    opacity: 0.92;\\n    font-weight: 400;\\n  }\\n\\n  /* ========== セクション見出し ========== */\\n  .section-heading {\\n    display: flex;\\n    align-items: center;\\n    gap: 10px;\\n    font-size: 1.2rem;\\n    font-weight: 700;\\n    color: #2C3E50;\\n    margin: 36px 0 18px;\\n    padding-bottom: 8px;\\n    border-bottom: 2px solid #D6E6F5;\\n  }\\n\\n  .section-badge {\\n    display: inline-flex;\\n    align-items: center;\\n    gap: 6px;\\n    font-size: 0.78rem;\\n    font-weight: 700;\\n    color: #fff;\\n    padding: 4px 12px;\\n    border-radius: 20px;\\n    letter-spacing: 0.02em;\\n    white-space: nowrap;\\n  }\\n\\n  .badge-copilot {\\n    background: linear-gradient(135deg, #4A90D9, #357ABD);\\n  }\\n\\n  .badge-notebooklm {\\n    background: linear-gradient(135deg, #5B9F4A, #4A8F3A);\\n  }\\n\\n  /* ========== 基本の型カード ========== */\\n  .steps-container {\\n    display: grid;\\n    grid-template-columns: repeat(3, 1fr);\\n    gap: 14px;\\n    margin-bottom: 8px;\\n  }\\n\\n  .step-card {\\n    background: #fff;\\n    border: 1.5px solid #D6E6F5;\\n    border-radius: 14px;\\n    padding: 20px 16px;\\n    text-align: center;\\n    transition: box-shadow 0.2s ease;\\n  }\\n\\n  .step-card:hover {\\n    box-shadow: 0 4px 16px rgba(74, 144, 217, 0.12);\\n  }\\n\\n  .step-number {\\n    display: inline-flex;\\n    align-items: center;\\n    justify-content: center;\\n    width: 36px;\\n    height: 36px;\\n    background: #4A90D9;\\n    color: #fff;\\n    border-radius: 50%;\\n    font-size: 0.95rem;\\n    font-weight: 700;\\n    margin-bottom: 10px;\\n  }\\n\\n  .step-label {\\n    font-weight: 700;\\n    font-size: 0.92rem;\\n    color: #2C3E50;\\n    margin-bottom: 6px;\\n  }\\n\\n  .step-example {\\n    font-size: 0.82rem;\\n    color: #666;\\n    line-height: 1.6;\\n  }\\n\\n  /* ========== プロンプトカード ========== */\\n  .prompt-card {\\n    background: #fff;\\n    border: 1.5px solid #D6E6F5;\\n    border-radius: 14px;\\n    padding: 0;\\n    margin-bottom: 20px;\\n    overflow: hidden;\\n    transition: box-shadow 0.2s ease;\\n  }\\n\\n  .prompt-card:hover {\\n    box-shadow: 0 4px 18px rgba(74, 144, 217, 0.10);\\n  }\\n\\n  .prompt-header {\\n    display: flex;\\n    align-items: center;\\n    justify-content: space-between;\\n    padding: 14px 18px;\\n    background: #F0F6FD;\\n    border-bottom: 1px solid #E3EDF7;\\n  }\\n\\n  .prompt-use {\\n    font-size: 0.95rem;\\n    font-weight: 700;\\n    color: #2C3E50;\\n    display: flex;\\n    align-items: center;\\n    gap: 8px;\\n  }\\n\\n  .prompt-use-icon {\\n    display: inline-flex;\\n    align-items: center;\\n    justify-content: center;\\n    width: 26px;\\n    height: 26px;\\n    background: #4A90D9;\\n    color: #fff;\\n    border-radius: 8px;\\n    font-size: 0.75rem;\\n    font-weight: 700;\\n    flex-shrink: 0;\\n  }\\n\\n  .copy-btn {\\n    display: inline-flex;\\n    align-items: center;\\n    gap: 5px;\\n    background: #4A90D9;\\n    color: #fff;\\n    border: none;\\n    border-radius: 8px;\\n    padding: 7px 14px;\\n    font-size: 0.78rem;\\n    font-weight: 600;\\n    cursor: pointer;\\n    transition: background 0.2s ease, transform 0.1s ease;\\n    white-space: nowrap;\\n    font-family: inherit;\\n  }\\n\\n  .copy-btn:hover {\\n    background: #357ABD;\\n  }\\n\\n  .copy-btn:active {\\n    transform: scale(0.96);\\n  }\\n\\n  .copy-btn.copied {\\n    background: #27AE60;\\n  }\\n\\n  .copy-btn-icon {\\n    font-size: 0.85rem;\\n  }\\n\\n  .prompt-body {\\n    padding: 18px 20px;\\n    position: relative;\\n  }\\n\\n  .prompt-text {\\n    font-size: 0.88rem;\\n    line-height: 1.9;\\n    white-space: pre-wrap;\\n    color: #444;\\n  }\\n\\n  .prompt-text .var-highlight {\\n    color: #E67E22;\\n    font-weight: 600;\\n  }\\n\\n  .prompt-note {\\n    margin-top: 14px;\\n    padding: 10px 14px;\\n    background: #FFF9F0;\\n    border-left: 3px solid #E67E22;\\n    border-radius: 0 8px 8px 0;\\n    font-size: 0.78rem;\\n    color: #8B6914;\\n    line-height: 1.7;\\n  }\\n\\n  /* ========== フッター ========== */\\n  .site-footer {\\n    margin-top: 40px;\\n    padding: 24px;\\n    background: #FFF5F5;\\n    border: 1.5px solid #F5D5D5;\\n    border-radius: 14px;\\n    text-align: center;\\n  }\\n\\n  .footer-warning {\\n    font-size: 0.9rem;\\n    font-weight: 700;\\n    color: #C0392B;\\n    margin-bottom: 10px;\\n    display: flex;\\n    align-items: center;\\n    justify-content: center;\\n    gap: 6px;\\n  }\\n\\n  .footer-tip {\\n    font-size: 0.82rem;\\n    color: #666;\\n    line-height: 1.7;\\n  }\\n\\n  /* ========== レスポンシブ ========== */\\n  @media (max-width: 600px) {\\n    .wrapper {\\n      padding: 16px 12px 36px;\\n    }\\n\\n    .site-header {\\n      padding: 24px 18px 22px;\\n      border-radius: 12px;\\n    }\\n\\n    .header-title {\\n      font-size: 1.25rem;\\n    }\\n\\n    .header-sub {\\n      font-size: 0.8rem;\\n    }\\n\\n    .steps-container {\\n      grid-template-columns: 1fr;\\n      gap: 10px;\\n    }\\n\\n    .step-card {\\n      display: flex;\\n      align-items: center;\\n      gap: 14px;\\n      text-align: left;\\n      padding: 16px;\\n    }\\n\\n    .step-number {\\n      margin-bottom: 0;\\n      flex-shrink: 0;\\n    }\\n\\n    .step-content {\\n      flex: 1;\\n    }\\n\\n    .prompt-header {\\n      flex-wrap: wrap;\\n      gap: 10px;\\n      padding: 12px 14px;\\n    }\\n\\n    .prompt-body {\\n      padding: 14px 16px;\\n    }\\n\\n    .prompt-text {\\n      font-size: 0.84rem;\\n    }\\n\\n    .section-heading {\\n      font-size: 1.05rem;\\n      flex-wrap: wrap;\\n    }\\n  }\\n\\n  /* ========== 印刷用 ========== */\\n  @media print {\\n    body {\\n      background: #fff;\\n      color: #000;\\n      font-size: 11pt;\\n      line-height: 1.6;\\n    }\\n\\n    .wrapper {\\n      max-width: 100%;\\n      padding: 0;\\n    }\\n\\n    .site-header {\\n      background: none;\\n      color: #000;\\n      border: 2px solid #333;\\n      border-radius: 0;\\n      padding: 16px;\\n      page-break-after: avoid;\\n    }\\n\\n    .site-header::after {\\n      display: none;\\n    }\\n\\n    .header-org {\\n      color: #333;\\n      opacity: 1;\\n    }\\n\\n    .header-title {\\n      font-size: 16pt;\\n    }\\n\\n    .header-sub {\\n      color: #333;\\n      opacity: 1;\\n    }\\n\\n    .section-heading {\\n      border-bottom-color: #999;\\n      page-break-after: avoid;\\n    }\\n\\n    .section-badge {\\n      background: #666 !important;\\n      -webkit-print-color-adjust: exact;\\n      print-color-adjust: exact;\\n    }\\n\\n    .steps-container {\\n      grid-template-columns: repeat(3, 1fr);\\n    }\\n\\n    .step-card {\\n      border-color: #999;\\n      border-radius: 0;\\n      page-break-inside: avoid;\\n    }\\n\\n    .step-number {\\n      background: #333;\\n      -webkit-print-color-adjust: exact;\\n      print-color-adjust: exact;\\n    }\\n\\n    .prompt-card {\\n      border-color: #999;\\n      border-radius: 0;\\n      page-break-inside: avoid;\\n      box-shadow: none;\\n    }\\n\\n    .prompt-header {\\n      background: #f0f0f0;\\n      border-bottom-color: #999;\\n      -webkit-print-color-adjust: exact;\\n      print-color-adjust: exact;\\n    }\\n\\n    .copy-btn {\\n      display: none !important;\\n    }\\n\\n    .prompt-text .var-highlight {\\n      color: #000;\\n      text-decoration: underline;\\n      font-weight: 700;\\n    }\\n\\n    .prompt-note {\\n      border-left-color: #666;\\n      background: #f5f5f5;\\n    }\\n\\n    .site-footer {\\n      border-color: #999;\\n      border-radius: 0;\\n      background: #fafafa;\\n    }\\n\\n    .footer-warning {\\n      color: #000;\\n    }\\n\\n    a {\\n      color: #000;\\n      text-decoration: none;\\n    }\\n  }\\n\u003C/style>\\n\u003C/head>\\n\u003Cbody>\\n\\n\u003Cdiv class=\\\"wrapper\\\">\\n\\n  \u003C!-- ===== ヘッダー ===== -->\\n  \u003Cheader class=\\\"site-header\\\">\\n    \u003Cdiv class=\\\"header-org\\\">北海道公立小中学校事務職員協議会 苫小牧市支部\u003C/div>\\n    \u003Ch1 class=\\\"header-title\\\">学校事務職員のための AIプロンプト集\u003C/h1>\\n    \u003Cp class=\\\"header-sub\\\">〔○○〕を書き換えるだけ！ コピーしてそのまま使えます\u003C/p>\\n  \u003C/header>\\n\\n  \u003C!-- ===== 基本の型セクション ===== -->\\n  \u003Ch2 class=\\\"section-heading\\\">📐 プロンプトの基本の型\u003C/h2>\\n\\n  \u003Cdiv class=\\\"steps-container\\\">\\n    \u003Cdiv class=\\\"step-card\\\">\\n      \u003Cdiv class=\\\"step-number\\\">①\u003C/div>\\n      \u003Cdiv class=\\\"step-content\\\">\\n        \u003Cdiv class=\\\"step-label\\\">役割を与える\u003C/div>\\n        \u003Cdiv class=\\\"step-example\\\">「あなたは○○です」\u003C/div>\\n      \u003C/div>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"step-card\\\">\\n      \u003Cdiv class=\\\"step-number\\\">②\u003C/div>\\n      \u003Cdiv class=\\\"step-content\\\">\\n        \u003Cdiv class=\\\"step-label\\\">具体的に伝える\u003C/div>\\n        \u003Cdiv class=\\\"step-example\\\">誰に・何を・何のために\u003Cbr>どんな口調で\u003C/div>\\n      \u003C/div>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"step-card\\\">\\n      \u003Cdiv class=\\\"step-number\\\">③\u003C/div>\\n      \u003Cdiv class=\\\"step-content\\\">\\n        \u003Cdiv class=\\\"step-label\\\">出力形式を指定\u003C/div>\\n        \u003Cdiv class=\\\"step-example\\\">「箇条書きで」「表形式で」\u003Cbr>「200字で」\u003C/div>\\n      \u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- ===== Copilot セクション ===== -->\\n  \u003Ch2 class=\\\"section-heading\\\">\\n    \u003Cspan class=\\\"section-badge badge-copilot\\\">✦ Copilot\u003C/span>\\n    Copilot で使う\\n  \u003C/h2>\\n\\n  \u003C!-- プロンプト1 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">1\u003C/span>\\n        教職員向けの周知文作成\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">あなたは学校事務職員です。\\n以下の内容を教職員向けに周知する文書を作成してください。\\n・周知する内容：\u003Cspan class=\\\"var-highlight\\\">〔○○（例：健康診断の日程変更）〕\u003C/span>\\n・対象：\u003Cspan class=\\\"var-highlight\\\">〔○○（例：全教職員／該当者のみ）〕\u003C/span>\\n・期限や締切：\u003Cspan class=\\\"var-highlight\\\">〔○○（例：3月10日まで）〕\u003C/span>\\n・口調：簡潔で丁寧に\\n・形式：A4・1枚に収まる分量で\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- プロンプト2 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">2\u003C/span>\\n        新任職員への引き継ぎ資料作成\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">あなたは学校事務の経験が豊富なベテラン職員です。\\n以下の業務について、新任事務職員向けの引き継ぎ資料を作成してください。\\n・業務名：\u003Cspan class=\\\"var-highlight\\\">〔○○（例：就学援助事務）〕\u003C/span>\\n・業務の時期：\u003Cspan class=\\\"var-highlight\\\">〔○○（例：毎年4月〜6月）〕\u003C/span>\\n・特に注意すべきこと：\u003Cspan class=\\\"var-highlight\\\">〔○○（例：申請書の押印漏れが多い）〕\u003C/span>\\n・形式：手順を番号つきで、注意点は目立つように分けて書いてください\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- ===== NotebookLM セクション ===== -->\\n  \u003Ch2 class=\\\"section-heading\\\">\\n    \u003Cspan class=\\\"section-badge badge-notebooklm\\\">📓 NotebookLM\u003C/span>\\n    NotebookLM で使う\\n  \u003C/h2>\\n\\n  \u003C!-- プロンプト3 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">3\u003C/span>\\n        通知文書をやさしい言葉で要約\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">この通知の内容を、高校生でもわかるようにやさしい言葉で要約してください。\\n専門用語や法令用語が出てきた場合は、かっこ書きでかみ砕いた説明を添えてください。\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- プロンプト4 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">4\u003C/span>\\n        通知文書から自分のアクションを抽出\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">私は学校事務職員です。\\nこの通知を読んで、学校事務職員として自分がやらなければならないことだけを箇条書きで抜き出してください。管理職や教員が行うことは除いてください。\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- プロンプト5 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">5\u003C/span>\\n        通知文書から期限つきタスクを時系列整理\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">この通知の中で、期限や締切が定められている項目をすべて抜き出してください。\\n表形式で、以下の列で整理してください。\\n・期限日（早い順）・やること・届出先／提出先・備考（注意点があれば）\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- プロンプト6 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">6\u003C/span>\\n        会議音声から議事録を作成\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">アップロードした音声は\u003Cspan class=\\\"var-highlight\\\">〔○○（例：第3回職員会議）〕\u003C/span>の録音データです。\\n以下の形式で議事録を作成してください。\\n・会議名：\u003Cspan class=\\\"var-highlight\\\">〔○○〕\u003C/span>\\n・日時：\u003Cspan class=\\\"var-highlight\\\">〔○○〕\u003C/span>\\n・出席者：\u003Cspan class=\\\"var-highlight\\\">〔○○（わかれば）〕\u003C/span>\\n・形式：議題ごとに「要旨」「決定事項」「次回までの宿題」を分けて整理してください\\n・口調：配布用の公式な文書として丁寧に\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- プロンプト7 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">7\u003C/span>\\n        市経理Excelデータの分析→報告文書作成\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">アップロードしたExcelデータは\u003Cspan class=\\\"var-highlight\\\">〔○○（例：令和7年度の市経理執行状況）〕\u003C/span>です。\\nこのデータを分析し、教職員に配布するための報告文書を作成してください。\\n・報告のポイント：\u003Cspan class=\\\"var-highlight\\\">〔○○（例：予算残額と今後の見通し）〕\u003C/span>\\n・形式：A4・1枚に収まる分量で、冒頭に要点をまとめ、その後に詳細を書いてください\\n・口調：教職員全員が読む前提で、わかりやすく丁寧に\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- プロンプト8 -->\\n  \u003Cdiv class=\\\"prompt-card\\\">\\n    \u003Cdiv class=\\\"prompt-header\\\">\\n      \u003Cdiv class=\\\"prompt-use\\\">\\n        \u003Cspan class=\\\"prompt-use-icon\\\">8\u003C/span>\\n        やることリストを整理してチェックリスト化\\n      \u003C/div>\\n      \u003Cbutton class=\\\"copy-btn\\\" onclick=\\\"copyPrompt(this)\\\">\\n        \u003Cspan class=\\\"copy-btn-icon\\\">📋\u003C/span>\u003Cspan class=\\\"copy-btn-label\\\">コピー\u003C/span>\\n      \u003C/button>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"prompt-body\\\">\\n      \u003Cdiv class=\\\"prompt-text\\\">アップロードしたファイルは、\u003Cspan class=\\\"var-highlight\\\">〔○○（例：年度末・年度初めの事務作業）〕\u003C/span>について自分で書き出したやることリストです。\\nこれを以下の形式で整理してください。\\n・時系列順に並べ替え\\n・チェックボックスつきのリスト形式\\n・漏れやすい作業には注意マークをつけてください\\n・期限があるものは期限も明記してください\u003C/div>\\n      \u003Cdiv class=\\\"prompt-note\\\">※ 事前にWordなどで「やること」をざっくり書き出してアップロードしてから使ってください\u003C/div>\\n    \u003C/div>\\n  \u003C/div>\\n\\n  \u003C!-- ===== フッター ===== -->\\n  \u003Cfooter class=\\\"site-footer\\\">\\n    \u003Cdiv class=\\\"footer-warning\\\">⚠ 個人情報・機密情報は絶対にAIに入力しないでください\u003C/div>\\n    \u003Cp class=\\\"footer-tip\\\">〔○○〕の部分を自分の業務に合わせて書き換えて使ってください\u003C/p>\\n  \u003C/footer>\\n\\n\u003C/div>\\n\\n\u003Cscript>\\nfunction copyPrompt(btn) {\\n  // プロンプトカード内の .prompt-text からプレーンテキストを取得\\n  var card = btn.closest('.prompt-card');\\n  var textEl = card.querySelector('.prompt-text');\\n\\n  // innerTextでプレーンテキストとして取得（HTMLタグを除去）\\n  var text = textEl.innerText;\\n\\n  // クリップボードにコピー\\n  if (navigator.clipboard && navigator.clipboard.writeText) {\\n    navigator.clipboard.writeText(text).then(function() {\\n      showCopied(btn);\\n    }).catch(function() {\\n      fallbackCopy(text, btn);\\n    });\\n  } else {\\n    fallbackCopy(text, btn);\\n  }\\n}\\n\\nfunction fallbackCopy(text, btn) {\\n  var ta = document.createElement('textarea');\\n  ta.value = text;\\n  ta.style.position = 'fixed';\\n  ta.style.left = '-9999px';\\n  ta.style.top = '-9999px';\\n  document.body.appendChild(ta);\\n  ta.focus();\\n  ta.select();\\n  try {\\n    document.execCommand('copy');\\n    showCopied(btn);\\n  } catch (e) {\\n    alert('コピーに失敗しました。手動でコピーしてください。');\\n  }\\n  document.body.removeChild(ta);\\n}\\n\\nfunction showCopied(btn) {\\n  var label = btn.querySelector('.copy-btn-label');\\n  var icon = btn.querySelector('.copy-btn-icon');\\n  var origLabel = label.textContent;\\n  var origIcon = icon.textContent;\\n\\n  label.textContent = 'コピーしました！';\\n  icon.textContent = '✅';\\n  btn.classList.add('copied');\\n\\n  setTimeout(function() {\\n    label.textContent = origLabel;\\n    icon.textContent = origIcon;\\n    btn.classList.remove('copied');\\n  }, 2000);\\n}\\n\u003C/script>\\n\\n\u003C/body>\\n\u003C/html>\\n\"}",{"id":152,"role":112,"content":157,"action":17,"recommend_actions":17,"is_prompt":23,"render_template":17,"session_state":158,"system_reminder":17,"message_type":17,"tool_ca step-number\">①\u003C/div>\n   485\t      \u003Cdiv class=\"step-content\">\n   486\t        \u003Cdiv class=\"step-label\">役割を与える\u003C/div>\n   487\t        \u003Cdiv class=\"step-example\">「あなたは○○です」\u003C/div>\n   488\t      \u003C/div>\n   489\t    \u003C/div>\n   490\t    \u003Cdiv class=\"step-card\">\n   491\t      \u003Cdiv class=\"step-number\">②\u003C/div>\n   492\t      \u003Cdiv class=\"step-content\">\n   493\t        \u003Cdiv class=\"step-label\">具体的に伝える\u003C/div>\n   494\t        \u003Cdiv class=\"step-example\">誰に・何を・何のために\u003Cbr>どんな口調で\u003C/div>\n   495\t      \u003C/div>\n   496\t    \u003C/div>\n   497\t    \u003Cdiv class=\"step-card\">\n   498\t      \u003Cdiv class=\"step-number\">③\u003C/div>\n   499\t      \u003Cdiv class=\"step-content\">\n   500\t        \u003Cdiv class=\"step-label\">出力形式を指定\u003C/div>\n   501\t        \u003Cdiv class=\"step-example\">「箇条書きで」「表形式で」\u003Cbr>「200字で」\u003C/div>\n   502\t      \u003C/div>\n   503\t    \u003C/div>\n   504\t  \u003C/div>\n   505\t\n   506\t  \u003C!-- ===== Copilot セクション ===== -->\n   507\t  \u003Ch2 class=\"section-heading\">\n   508\t    \u003Cspan class=\"section-badge badge-copilot\">✦ Copilot\u003C/span>\n   509\t    Copilot で使う\n   510\t  \u003C/h2>\n   511\t\n   512\t  \u003C!-- プロンプト1 -->\n   513\t  \u003Cdiv class=\"prompt-card\">\n   514\t    \u003Cdiv class=\"prompt-header\">\n   515\t      \u003Cdiv class=\"prompt-use\">\n   516\t        \u003Cspan class=\"prompt-use-icon\">1\u003C/span>\n   517\t        教職員向けの周知文作成\n   518\t      \u003C/div>\n   519\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   520\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   521\t      \u003C/button>\n   522\t    \u003C/div>\n   523\t    \u003Cdiv class=\"prompt-body\">\n   524\t      \u003Cdiv class=\"prompt-text\">あなたは学校事務職員です。\n   525\t以下の内容を教職員向けに周知する文書を作成してください。\n   526\t・周知する内容：\u003Cspan class=\"var-highlight\">〔○○（例：健康診断の日程変更）〕\u003C/span>\n   527\t・対象：\u003Cspan class=\"var-highlight\">〔○○（例：全教職員／該当者のみ）〕\u003C/span>\n   528\t・期限や締切：\u003Cspan class=\"var-highlight\">〔○○（例：3月10日まで）〕\u003C/span>\n   529\t・口調：簡潔で丁寧に\n   530\t・形式：A4・1枚に収まる分量で\u003C/div>\n   531\t    \u003C/div>\n   532\t  \u003C/div>\n   533\t\n   534\t  \u003C!-- プロンプト2 -->\n   535\t  \u003Cdiv class=\"prompt-card\">\n   536\t    \u003Cdiv class=\"prompt-header\">\n   537\t      \u003Cdiv class=\"prompt-use\">\n   538\t        \u003Cspan class=\"prompt-use-icon\">2\u003C/span>\n   539\t        新任職員への引き継ぎ資料作成\n   540\t      \u003C/div>\n   541\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   542\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   543\t      \u003C/button>\n   544\t    \u003C/div>\n   545\t    \u003Cdiv class=\"prompt-body\">\n   546\t      \u003Cdiv class=\"prompt-text\">あなたは学校事務の経験が豊富なベテラン職員です。\n   547\t以下の業務について、新任事務職員向けの引き継ぎ資料を作成してください。\n   548\t・業務名：\u003Cspan class=\"var-highlight\">〔○○（例：就学援助事務）〕\u003C/span>\n   549\t・業務の時期：\u003Cspan class=\"var-highlight\">〔○○（例：毎年4月〜6月）〕\u003C/span>\n   550\t・特に注意すべきこと：\u003Cspan class=\"var-highlight\">〔○○（例：申請書の押印漏れが多い）〕\u003C/span>\n   551\t・形式：手順を番号つきで、注意点は目立つように分けて書いてください\u003C/div>\n   552\t    \u003C/div>\n   553\t  \u003C/div>\n   554\t\n   555\t  \u003C!-- ===== NotebookLM セクション ===== -->\n   556\t  \u003Ch2 class=\"section-heading\">\n   557\t    \u003Cspan class=\"section-badge badge-notebooklm\">📓 NotebookLM\u003C/span>\n   558\t    NotebookLM で使う\n   559\t  \u003C/h2>\n   560\t\n   561\t  \u003C!-- プロンプト3 -->\n   562\t  \u003Cdiv class=\"prompt-card\">\n   563\t    \u003Cdiv class=\"prompt-header\">\n   564\t      \u003Cdiv class=\"prompt-use\">\n   565\t        \u003Cspan class=\"prompt-use-icon\">3\u003C/span>\n   566\t        通知文書をやさしい言葉で要約\n   567\t      \u003C/div>\n   568\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   569\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   570\t      \u003C/button>\n   571\t    \u003C/div>\n   572\t    \u003Cdiv class=\"prompt-body\">\n   573\t      \u003Cdiv class=\"prompt-text\">この通知の内容を、高校生でもわかるようにやさしい言葉で要約してください。\n   574\t専門用語や法令用語が出てきた場合は、かっこ書きでかみ砕いた説明を添えてください。\u003C/div>\n   575\t    \u003C/div>\n   576\t  \u003C/div>\n   577\t\n   578\t  \u003C!-- プロンプト4 -->\n   579\t  \u003Cdiv class=\"prompt-card\">\n   580\t    \u003Cdiv class=\"prompt-header\">\n   581\t      \u003Cdiv class=\"prompt-use\">\n   582\t        \u003Cspan class=\"prompt-use-icon\">4\u003C/span>\n   583\t        通知文書から自分のアクションを抽出\n   584\t      \u003C/div>\n   585\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   586\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   587\t      \u003C/button>\n   588\t    \u003C/div>\n   589\t    \u003Cdiv class=\"prompt-body\">\n   590\t      \u003Cdiv class=\"prompt-text\">私は学校事務職員です。\n   591\tこの通知を読んで、学校事務職員として自分がやらなければならないことだけを箇条書きで抜き出してください。管理職や教員が行うことは除いてください。\u003C/div>\n   592\t    \u003C/div>\n   593\t  \u003C/div>\n   594\t\n   595\t  \u003C!-- プロンプト5 -->\n   596\t  \u003Cdiv class=\"prompt-card\">\n   597\t    \u003Cdiv class=\"prompt-header\">\n   598\t      \u003Cdiv class=\"prompt-use\">\n   599\t        \u003Cspan class=\"prompt-use-icon\">5\u003C/span>\n   600\t        通知文書から期限つきタスクを時系列整理\n   601\t      \u003C/div>\n   602\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   603\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   604\t      \u003C/button>\n   605\t    \u003C/div>\n   606\t    \u003Cdiv class=\"prompt-body\">\n   607\t      \u003Cdiv class=\"prompt-text\">この通知の中で、期限や締切が定められている項目をすべて抜き出してください。\n   608\t表形式で、以下の列で整理してください。\n   609\t・期限日（早い順）・やること・届出先／提出先・備考（注意点があれば）\u003C/div>\n   610\t    \u003C/div>\n   611\t  \u003C/div>\n   612\t\n   613\t  \u003C!-- プロンプト6 -->\n   614\t  \u003Cdiv class=\"prompt-card\">\n   615\t    \u003Cdiv class=\"prompt-header\">\n   616\t      \u003Cdiv class=\"prompt-use\">\n   617\t        \u003Cspan class=\"prompt-use-icon\">6\u003C/span>\n   618\t        会議音声から議事録を作成\n   619\t      \u003C/div>\n   620\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   621\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   622\t      \u003C/button>\n   623\t    \u003C/div>\n   624\t    \u003Cdiv class=\"prompt-body\">\n   625\t      \u003Cdiv class=\"prompt-text\">アップロードした音声は\u003Cspan class=\"var-highlight\">〔○○（例：第3回職員会議）〕\u003C/span>の録音データです。\n   626\t以下の形式で議事録を作成してください。\n   627\t・会議名：\u003Cspan class=\"var-highlight\">〔○○〕\u003C/span>\n   628\t・日時：\u003Cspan class=\"var-highlight\">〔○○〕\u003C/span>\n   629\t・出席者：\u003Cspan class=\"var-highlight\">〔○○（わかれば）〕\u003C/span>\n   630\t・形式：議題ごとに「要旨」「決定事項」「次回までの宿題」を分けて整理してください\n   631\t・口調：配布用の公式な文書として丁寧に\u003C/div>\n   632\t    \u003C/div>\n   633\t  \u003C/div>\n   634\t\n   635\t  \u003C!-- プロンプト7 -->\n   636\t  \u003Cdiv class=\"prompt-card\">\n   637\t    \u003Cdiv class=\"prompt-header\">\n   638\t      \u003Cdiv class=\"prompt-use\">\n   639\t        \u003Cspan class=\"prompt-use-icon\">7\u003C/span>\n   640\t        市経理Excelデータの分析→報告文書作成\n   641\t      \u003C/div>\n   642\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   643\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   644\t      \u003C/button>\n   645\t    \u003C/div>\n   646\t    \u003Cdiv class=\"prompt-body\">\n   647\t      \u003Cdiv class=\"prompt-text\">アップロードしたExcelデータは\u003Cspan class=\"var-highlight\">〔○○（例：令和7年度の市経理執行状況）〕\u003C/span>です。\n   648\tこのデータを分析し、教職員に配布するための報告文書を作成してください。\n   649\t・報告のポイント：\u003Cspan class=\"var-highlight\">〔○○（例：予算残額と今後の見通し）〕\u003C/span>\n   650\t・形式：A4・1枚に収まる分量で、冒頭に要点をまとめ、その後に詳細を書いてください\n   651\t・口調：教職員全員が読む前提で、わかりやすく丁寧に\u003C/div>\n   652\t    \u003C/div>\n   653\t  \u003C/div>\n   654\t\n   655\t  \u003C!-- プロンプト8 -->\n   656\t  \u003Cdiv class=\"prompt-card\">\n   657\t    \u003Cdiv class=\"prompt-header\">\n   658\t      \u003Cdiv class=\"prompt-use\">\n   659\t        \u003Cspan class=\"prompt-use-icon\">8\u003C/span>\n   660\t        やることリストを整理してチェックリスト化\n   661\t      \u003C/div>\n   662\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   663\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   664\t      \u003C/button>\n   665\t    \u003C/div>\n   666\t    \u003Cdiv class=\"prompt-body\">\n   667\t      \u003Cdiv class=\"prompt-text\">アップロードしたファイルは、\u003Cspan class=\"var-highlight\">〔○○（例：年度末・年度初めの事務作業）〕\u003C/span>について自分で書き出したやることリストです。\n   668\tこれを以下の形式で整理してください。\n   669\t・時系列順に並べ替え\n   670\t・チェックボックスつきのリスト形式\n   671\t・漏れやすい作業には注意マークをつけてください\n   672\t・期限があるものは期限も明記してください\u003C/div>\n   673\t      \u003Cdiv class=\"prompt-note\">※ 事前にWordなどで「やること」をざっくり書き出してアップロードしてから使ってください\u003C/div>\n   674\t    \u003C/div>\n   675\t  \u003C/div>\n   676\t\n   677\t  \u003C!-- ===== フッター ===== -->\n   678\t  \u003Cfooter class=\"site-footer\">\n   679\t    \u003Cdiv class=\"footer-warning\">⚠ 個人情報・機密情報は絶対にAIに入力しないでください\u003C/div>\n   680\t    \u003Cp class=\"footer-tip\">〔○○〕の部分を自分の業務に合わせて書き換えて使ってください\u003C/p>\n   681\t  \u003C/footer>\n   682\t\n   683\t\u003C/div>\n   684\t\n   685\t\u003Cscript>\n   686\tfunction copyPrompt(btn) {\n   687\t  // プロンプトカード内の .prompt-text からプレーンテキストを取得\n   688\t  var card = btn.closest('.prompt-card');\n   689\t  var textEl = card.querySelector('.prompt-text');\n   690\t\n   691\t  // innerTextでプレーンテキストとして取得（HTMLタグを除去）\n   692\t  var text = textEl.innerText;\n   693\t\n   694\t  // クリップボードにコピー\n   695\t  if (navigator.clipboard && navigator.clipboard.writeText) {\n   696\t    navigator.clipboard.writeText(text).then(function() {\n   697\t      showCopied(btn);\n   698\t    }).catch(function() {\n   699\t      fallbackCopy(text, btn);\n   700\t    });\n   701\t  } else {\n   702\t    fallbackCopy(text, btn);\n   703\t  }\n   704\t}\n   705\t\n   706\tfunction fallbackCopy(text, btn) {\n   707\t  var ta = document.createElement('textarea');\n   708\t  ta.value = text;\n   709\t  ta.style.position = 'fixed';\n   710\t  ta.style.left = '-9999px';\n   711\t  ta.style.top = '-9999px';\n   712\t  document.body.appendChild(ta);\n   713\t  ta.focus();\n   714\t  ta.select();\n   715\t  try {\n   716\t    document.execCommand('copy');\n   717\t    showCopied(btn);\n   718\t  } catch (e) {\n   719\t    alert('コピーに失敗しました。手動でコピーしてください。');\n   720\t  }\n   721\t  document.body.removeChild(ta);\n   722\t}\n   723\t\n   724\tfunction showCopied(btn) {\n   725\t  var label = btn.querySelector('.copy-btn-label');\n   726\t  var icon = btn.querySelector('.copy-btn-icon');\n   727\t  var origLabel = label.textContent;\n   728\t  var origIcon = icon.textContent;\n   729\t\n   730\t  label.textContent = 'コピーしました！';\n   731\t  icon.textContent = '✅';\n   732\t  btn.classList.add('copied');\n   733\t\n   734\t  setTimeout(function() {\n   735\t    label.textContent = origLabel;\n   736\t    icon.textContent = origIcon;\n   737\t    btn.classList.remove('copied');\n   738\t  }, 2000);\n   739\t}\n   740\t\u003C/script>\n   741\t\n   742\t\u003C/body>\n   743\t\u003C/html>\n   744\t",{"file_path":30,"file_type":351,"lines_read":161,"total_lines_in_file":161,"created_at":33,"updated_at":33},"text",{"id":353,"role":92,"content":354,"action":17,"recommend_actions":17,"is_prompt":23,"render_template":17,"session_state":355,"system_reminder":17,"message_type":17,"tool_calls":363,"tool_call_id":17,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"reasoning_content":17,"cogen_id":17,"ctime":17},"f3689fcd-feb6-4e5d-a22    border: 1.5px solid #C0392B;\n   585\t      border-radius: 6px;\n   586\t      background: #FFF5F5 !important;\n   587\t    }\n   588\t\n   589\t    .footer-warning {\n   590\t      font-size: 9pt;\n   591\t      color: #C0392B;\n   592\t    }\n   593\t\n   594\t    .footer-tip {\n   595\t      font-size: 8pt;\n   596\t    }\n   597\t\n   598\t    a {\n   599\t      color: #000;\n   600\t      text-decoration: none;\n   601\t    }\n   602\t  }\n   603\t\u003C/style>\n   604\t\u003C/head>\n   605\t\u003Cbody>\n   606\t\n   607\t\u003C!-- ===== PDF保存バー ===== -->\n   608\t\u003Cdiv class=\"print-bar\">\n   609\t  \u003Cdiv class=\"print-bar-inner\">\n   610\t    \u003Cspan class=\"print-bar-text\">📄 このページをPDFとして保存できます\u003C/span>\n   611\t    \u003Cbutton class=\"print-btn\" onclick=\"window.print()\">\n   612\t      🖨️ PDFとして保存 / 印刷\n   613\t    \u003C/button>\n   614\t  \u003C/div>\n   615\t\u003C/div>\n   616\t\n   617\t\u003Cdiv class=\"wrapper\">\n   618\t\n   619\t  \u003C!-- ===== ヘッダー ===== -->\n   620\t  \u003Cheader class=\"site-header\">\n   621\t    \u003Cdiv class=\"header-org\">北海道公立小中学校事務職員協議会 苫小牧市支部\u003C/div>\n   622\t    \u003Ch1 class=\"header-title\">学校事務職員のための AIプロンプト集\u003C/h1>\n   623\t    \u003Cp class=\"header-sub\">〔○○〕を書き換えるだけ！ コピーしてそのまま使えます\u003C/p>\n   624\t  \u003C/header>\n   625\t\n   626\t  \u003C!-- ===== 基本の型セクション ===== -->\n   627\t  \u003Ch2 class=\"section-heading\">📐 プロンプトの基本の型\u003C/h2>\n   628\t\n   629\t  \u003Cdiv class=\"steps-container\">\n   630\t    \u003Cdiv class=\"step-card\">\n   631\t      \u003Cdiv class=\"step-number\">①\u003C/div>\n   632\t      \u003Cdiv class=\"step-content\">\n   633\t        \u003Cdiv class=\"step-label\">役割を与える\u003C/div>\n   634\t        \u003Cdiv class=\"step-example\">「あなたは○○です」\u003C/div>\n   635\t      \u003C/div>\n   636\t    \u003C/div>\n   637\t    \u003Cdiv class=\"step-card\">\n   638\t      \u003Cdiv class=\"step-number\">②\u003C/div>\n   639\t      \u003Cdiv class=\"step-content\">\n   640\t        \u003Cdiv class=\"step-label\">具体的に伝える\u003C/div>\n   641\t        \u003Cdiv class=\"step-example\">誰に・何を・何のために\u003Cbr>どんな口調で\u003C/div>\n   642\t      \u003C/div>\n   643\t    \u003C/div>\n   644\t    \u003Cdiv class=\"step-card\">\n   645\t      \u003Cdiv class=\"step-number\">③\u003C/div>\n   646\t      \u003Cdiv class=\"step-content\">\n   647\t        \u003Cdiv class=\"step-label\">出力形式を指定\u003C/div>\n   648\t        \u003Cdiv class=\"step-example\">「箇条書きで」「表形式で」\u003Cbr>「200字で」\u003C/div>\n   649\t      \u003C/div>\n   650\t    \u003C/div>\n   651\t  \u003C/div>\n   652\t\n   653\t  \u003C!-- ===== Copilot セクション ===== -->\n   654\t  \u003Ch2 class=\"section-heading\">\n   655\t    \u003Cspan class=\"section-badge badge-copilot\">✦ Copilot\u003C/span>\n   656\t    Copilot で使う\n   657\t  \u003C/h2>\n   658\t\n   659\t  \u003C!-- プロンプト1 -->\n   660\t  \u003Cdiv class=\"prompt-card\">\n   661\t    \u003Cdiv class=\"prompt-header\">\n   662\t      \u003Cdiv class=\"prompt-use\">\n   663\t        \u003Cspan class=\"prompt-use-icon\">1\u003C/span>\n   664\t        教職員向けの周知文作成\n   665\t      \u003C/div>\n   666\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   667\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   668\t      \u003C/button>\n   669\t    \u003C/div>\n   670\t    \u003Cdiv class=\"prompt-body\">\n   671\t      \u003Cdiv class=\"prompt-text\">あなたは学校事務職員です。\n   672\t以下の内容を教職員向けに周知する文書を作成してください。\n   673\t・周知する内容：\u003Cspan class=\"var-highlight\">〔○○（例：健康診断の日程変更）〕\u003C/span>\n   674\t・対象：\u003Cspan class=\"var-highlight\">〔○○（例：全教職員／該当者のみ）〕\u003C/span>\n   675\t・期限や締切：\u003Cspan class=\"var-highlight\">〔○○（例：3月10日まで）〕\u003C/span>\n   676\t・口調：簡潔で丁寧に\n   677\t・形式：A4・1枚に収まる分量で\u003C/div>\n   678\t    \u003C/div>\n   679\t  \u003C/div>\n   680\t\n   681\t  \u003C!-- プロンプト2 -->\n   682\t  \u003Cdiv class=\"prompt-card\">\n   683\t    \u003Cdiv class=\"prompt-header\">\n   684\t      \u003Cdiv class=\"prompt-use\">\n   685\t        \u003Cspan class=\"prompt-use-icon\">2\u003C/span>\n   686\t        新任職員への引き継ぎ資料作成\n   687\t      \u003C/div>\n   688\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   689\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   690\t      \u003C/button>\n   691\t    \u003C/div>\n   692\t    \u003Cdiv class=\"prompt-body\">\n   693\t      \u003Cdiv class=\"prompt-text\">あなたは学校事務の経験が豊富なベテラン職員です。\n   694\t以下の業務について、新任事務職員向けの引き継ぎ資料を作成してください。\n   695\t・業務名：\u003Cspan class=\"var-highlight\">〔○○（例：就学援助事務）〕\u003C/span>\n   696\t・業務の時期：\u003Cspan class=\"var-highlight\">〔○○（例：毎年4月〜6月）〕\u003C/span>\n   697\t・特に注意すべきこと：\u003Cspan class=\"var-highlight\">〔○○（例：申請書の押印漏れが多い）〕\u003C/span>\n   698\t・形式：手順を番号つきで、注意点は目立つように分けて書いてください\u003C/div>\n   699\t    \u003C/div>\n   700\t  \u003C/div>\n   701\t\n   702\t  \u003C!-- ===== NotebookLM セクション ===== -->\n   703\t  \u003Ch2 class=\"section-heading\">\n   704\t    \u003Cspan class=\"section-badge badge-notebooklm\">📓 NotebookLM\u003C/span>\n   705\t    NotebookLM で使う\n   706\t  \u003C/h2>\n   707\t\n   708\t  \u003C!-- プロンプト3 -->\n   709\t  \u003Cdiv class=\"prompt-card\">\n   710\t    \u003Cdiv class=\"prompt-header\">\n   711\t      \u003Cdiv class=\"prompt-use\">\n   712\t        \u003Cspan class=\"prompt-use-icon\">3\u003C/span>\n   713\t        通知文書をやさしい言葉で要約\n   714\t      \u003C/div>\n   715\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   716\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   717\t      \u003C/button>\n   718\t    \u003C/div>\n   719\t    \u003Cdiv class=\"prompt-body\">\n   720\t      \u003Cdiv class=\"prompt-text\">この通知の内容を、高校生でもわかるようにやさしい言葉で要約してください。\n   721\t専門用語や法令用語が出てきた場合は、かっこ書きでかみ砕いた説明を添えてください。\u003C/div>\n   722\t    \u003C/div>\n   723\t  \u003C/div>\n   724\t\n   725\t  \u003C!-- プロンプト4 -->\n   726\t  \u003Cdiv class=\"prompt-card\">\n   727\t    \u003Cdiv class=\"prompt-header\">\n   728\t      \u003Cdiv class=\"prompt-use\">\n   729\t        \u003Cspan class=\"prompt-use-icon\">4\u003C/span>\n   730\t        通知文書から自分のアクションを抽出\n   731\t      \u003C/div>\n   732\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   733\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   734\t      \u003C/button>\n   735\t    \u003C/div>\n   736\t    \u003Cdiv class=\"prompt-body\">\n   737\t      \u003Cdiv class=\"prompt-text\">私は学校事務職員です。\n   738\tこの通知を読んで、学校事務職員として自分がやらなければならないことだけを箇条書きで抜き出してください。管理職や教員が行うことは除いてください。\u003C/div>\n   739\t    \u003C/div>\n   740\t  \u003C/div>\n   741\t\n   742\t  \u003C!-- プロンプト5 -->\n   743\t  \u003Cdiv class=\"prompt-card\">\n   744\t    \u003Cdiv class=\"prompt-header\">\n   745\t      \u003Cdiv class=\"prompt-use\">\n   746\t        \u003Cspan class=\"prompt-use-icon\">5\u003C/span>\n   747\t        通知文書から期限つきタスクを時系列整理\n   748\t      \u003C/div>\n   749\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   750\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   751\t      \u003C/button>\n   752\t    \u003C/div>\n   753\t    \u003Cdiv class=\"prompt-body\">\n   754\t      \u003Cdiv class=\"prompt-text\">この通知の中で、期限や締切が定められている項目をすべて抜き出してください。\n   755\t表形式で、以下の列で整理してください。\n   756\t・期限日（早い順）・やること・届出先／提出先・備考（注意点があれば）\u003C/div>\n   757\t    \u003C/div>\n   758\t  \u003C/div>\n   759\t\n   760\t  \u003C!-- プロンプト6 -->\n   761\t  \u003Cdiv class=\"prompt-card\">\n   762\t    \u003Cdiv class=\"prompt-header\">\n   763\t      \u003Cdiv class=\"prompt-use\">\n   764\t        \u003Cspan class=\"prompt-use-icon\">6\u003C/span>\n   765\t        会議音声から議事録を作成\n   766\t      \u003C/div>\n   767\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   768\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   769\t      \u003C/button>\n   770\t    \u003C/div>\n   771\t    \u003Cdiv class=\"prompt-body\">\n   772\t      \u003Cdiv class=\"prompt-text\">アップロードした音声は\u003Cspan class=\"var-highlight\">〔○○（例：第3回職員会議）〕\u003C/span>の録音データです。\n   773\t以下の形式で議事録を作成してください。\n   774\t・会議名：\u003Cspan class=\"var-highlight\">〔○○〕\u003C/span>\n   775\t・日時：\u003Cspan class=\"var-highlight\">〔○○〕\u003C/span>\n   776\t・出席者：\u003Cspan class=\"var-highlight\">〔○○（わかれば）〕\u003C/span>\n   777\t・形式：議題ごとに「要旨」「決定事項」「次回までの宿題」を分けて整理してください\n   778\t・口調：配布用の公式な文書として丁寧に\u003C/div>\n   779\t    \u003C/div>\n   780\t  \u003C/div>\n   781\t\n   782\t  \u003C!-- プロンプト7 -->\n   783\t  \u003Cdiv class=\"prompt-card\">\n   784\t    \u003Cdiv class=\"prompt-header\">\n   785\t      \u003Cdiv class=\"prompt-use\">\n   786\t        \u003Cspan class=\"prompt-use-icon\">7\u003C/span>\n   787\t        市経理Excelデータの分析→報告文書作成\n   788\t      \u003C/div>\n   789\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   790\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   791\t      \u003C/button>\n   792\t    \u003C/div>\n   793\t    \u003Cdiv class=\"prompt-body\">\n   794\t      \u003Cdiv class=\"prompt-text\">アップロードしたExcelデータは\u003Cspan class=\"var-highlight\">〔○○（例：令和7年度の市経理執行状況）〕\u003C/span>です。\n   795\tこのデータを分析し、教職員に配布するための報告文書を作成してください。\n   796\t・報告のポイント：\u003Cspan class=\"var-highlight\">〔○○（例：予算残額と今後の見通し）〕\u003C/span>\n   797\t・形式：A4・1枚に収まる分量で、冒頭に要点をまとめ、その後に詳細を書いてください\n   798\t・口調：教職員全員が読む前提で、わかりやすく丁寧に\u003C/div>\n   799\t    \u003C/div>\n   800\t  \u003C/div>\n   801\t\n   802\t  \u003C!-- プロンプト8 -->\n   803\t  \u003Cdiv class=\"prompt-card\">\n   804\t    \u003Cdiv class=\"prompt-header\">\n   805\t      \u003Cdiv class=\"prompt-use\">\n   806\t        \u003Cspan class=\"prompt-use-icon\">8\u003C/span>\n   807\t        やることリストを整理してチェックリスト化\n   808\t      \u003C/div>\n   809\t      \u003Cbutton class=\"copy-btn\" onclick=\"copyPrompt(this)\">\n   810\t        \u003Cspan class=\"copy-btn-icon\">📋\u003C/span>\u003Cspan class=\"copy-btn-label\">コピー\u003C/span>\n   811\t      \u003C/button>\n   812\t    \u003C/div>\n   813\t    \u003Cdiv class=\"prompt-body\">\n   814\t      \u003Cdiv class=\"prompt-text\">アップロードしたファイルは、\u003Cspan class=\"var-highlight\">〔○○（例：年度末・年度初めの事務作業）〕\u003C/span>について自分で書き出したやることリストです。\n   815\tこれを以下の形式で整理してください。\n   816\t・時系列順に並べ替え\n   817\t・チェックボックスつきのリスト形式\n   818\t・漏れやすい作業には注意マークをつけてください\n   819\t・期限があるものは期限も明記してください\u003C/div>\n   820\t      \u003Cdiv class=\"prompt-note\">※ 事前にWordなどで「やること」をざっくり書き出してアップロードしてから使ってください\u003C/div>\n   821\t    \u003C/div>\n   822\t  \u003C/div>\n   823\t\n   824\t  \u003C!-- ===== フッター ===== -->\n   825\t  \u003Cfooter class=\"site-footer\">\n   826\t    \u003Cdiv class=\"footer-warning\">⚠ 個人情報・機密情報は絶対にAIに入力しないでください\u003C/div>\n   827\t    \u003Cp class=\"footer-tip\">〔○○〕の部分を自分の業務に合わせて書き換えて使ってください\u003C/p>\n   828\t  \u003C/footer>\n   829\t\n   830\t\u003C/div>\n   831\t\n   832\t\u003Cscript>\n   833\tfunction copyPrompt(btn) {\n   834\t  // プロンプトカード内の .prompt-text からプレーンテキストを取得\n   835\t  var card = btn.closest('.prompt-card');\n   836\t  var textEl = card.querySelector('.prompt-text');\n   837\t\n   838\t  // innerTextでプレーンテキストとして取得（HTMLタグを除去）\n   839\t  var text = textEl.innerText;\n   840\t\n   841\t  // クリップボードにコピー\n   842\t  if (navigator.clipboard && navigator.clipboard.writeText) {\n   843\t    navigator.clipboard.writeText(text).then(function() {\n   844\t      showCopied(btn);\n   845\t    }).catch(function() {\n   846\t      fallbackCopy(text, btn);\n   847\t    });\n   848\t  } else {\n   849\t    fallbackCopy(text, btn);\n   850\t  }\n   851\t}\n   852\t\n   853\tfunction fallbackCopy(text, btn) {\n   854\t  var ta = document.createElement('textarea');\n   855\t  ta.value = text;\n   856\t  ta.style.position = 'fixed';\n   857\t  ta.style.left = '-9999px';\n   858\t  ta.style.top = '-9999px';\n   859\t  document.body.appendChild(ta);\n   860\t  ta.focus();\n   861\t  ta.select();\n   862\t  try {\n   863\t    document.execCommand('copy');\n   864\t    showCopied(btn);\n   865\t  } catch (e) {\n   866\t    alert('コピーに失敗しました。手動でコピーしてください。');\n   867\t  }\n   868\t  document.body.removeChild(ta);\n   869\t}\n   870\t\n   871\tfunction showCopied(btn) {\n   872\t  var label = btn.querySelector('.copy-btn-label');\n   873\t  var icon = btn.querySelector('.copy-btn-icon');\n   874\t  var origLabel = label.textContent;\n   875\t  var origIcon = icon.textContent;\n   876\t\n   877\t  label.textContent = 'コピーしました！';\n   878\t  icon.textContent = '✅';\n   879\t  btn.classList.add('copied');\n   880\t\n   881\t  setTimeout(function() {\n   882\t    label.textContent = origLabel;\n   883\t    icon.textContent = origIcon;\n   884\t    btn.classList.remove('copied');\n   885\t  }, 2000);\n   886\t}\n   887\t\u003C/script>\n   888\t\n   889\t\u003C/body>\n   890\t\u003C/html>\n   891\t",{"file_path":30,"file_type":351,"lines_read":487,"total_lines_in_file":487,"created_at":33,"updated_at":34},891,{"id":489,"role":92,"content":21,"action":17,"recommend_actions":17,"is_prompt":23,"render_template":17,"session_state":490,"system_reminder":17,"message_type":17,"tool_calls":498,"tool_call_id":17,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"reasoning_content":17,"cogen_id":17,"ctime":17},"97001f4b-fc97-4c0f-922d-0a95b1e8d374",{"_llm_usage":491,"_finish_reason":103},{"completion_tokens":492,"prompt_tokens":131,"total_tokens":493,"completion_tokens_details":494,"prompt_tokens_details":495,"cache_creation_input_tokens":497,"cache_read_input_tokens":496},375,51150,{"accepted_prediction_tokens":17,"audio_tokens":17,"reasoning_tokens":5,"rejected_prediction_tokens":17},{"audio_tokens":17,"cached_tokens":496,"cache_creation_toke ------|\\n| 1 | 教職員向けの周知文作成 |\\n| 2 | 新任職員への引き継ぎ資料作成 |\\n\\n### NotebookLM で使う\\n| # | 用途 |\\n|---|------|\\n| 3 | 通知文書をやさしい言葉で要約 |\\n| 4 | 通知文書から自分のアクションを抽出 |\\n| 5 | 通知文書から期限つきタスクを時系列整理 |\\n| 6 | 会議音声から議事録を作成 |\\n| 7 | 市経理Excelデータの分析→報告文書作成 |\\n| 8 | やることリストを整理してチェックリスト化 |\\n\\n## 🚀 使い方\\n\\n### 方法1：GitHub Pages で公開する\\n\\n1. このリポジトリを Fork または Clone\\n2. リポジトリの **Settings** → **Pages** → Source を `main` / `/ (root)` に設定\\n3. 数分後に `https://\u003Cユーザー名>.github.io/\u003Cリポジトリ名>/` でアクセス可能に\\n\\n### 方法2：ローカルで使う\\n\\n1. `index.html` をダウンロード\\n2. ブラウザで開くだけ（サーバー不要・外部ライブラリ不要）\\n\\n### 方法3：PDF化して配布する\\n\\n1. `index.html` をブラウザで開く\\n2. ページ上部の **「🖨️ PDFとして保存 / 印刷」** ボタンをクリック\\n3. 送信先を **「PDFに保存」** に変更して保存\\n\\n> 💡 Chrome の場合「詳細設定」→「背景のグラフィック」にチェックを入れると、ヘッダーの青色やバッジの色がきれいに反映されます。\\n\\n## 📁 ファイル構成\\n\\n```\\n.\\n├── index.html   ← 本体（CSS・JS込みの単一ファイル）\\n├── README.md    ← このファイル\\n├── LICENSE      ← MITライセンス\\n└── .gitignore\\n```\\n\\n## 🛠 技術仕様\\n\\n- **単一HTMLファイル** で完結（外部CDN・ライブラリ不使用）\\n- CSS・JavaScript はすべてインライン記述\\n- Clipboard API + fallback（execCommand）によるコピー機能\\n- `@media print` による印刷・PDF保存最適化（A4サイズ対応）\\n- レスポンシブ対応（600px以下でモバイルレイアウト）\\n\\n## ⚠️ 注意事項\\n\\n- **個人情報・機密情報は絶対にAIに入力しないでください**\\n- プロンプト内の `〔○○〕` はあくまで例です。実際の業務内容に合わせて書き換えてください\\n\\n## 📄 ライセンス\\n\\n[MIT License](./LICENSE)\\n\\n---\\n\\n\u003Cp align=\\\"center\\\">\\n  \u003Cstrong>北海道公立小中学校事務職員協議会 苫小牧市支部\u003C/strong>\\n\u003C/p>\\n\", \"file_path\": \"README.md\", \"overwrite\": true}",{"id":580,"role":112,"content":584,"action":17,"recommend_actions":17,"is_prompt":23,"render_template":17,"session_state":585,"system_reminder":17,"message_type":17,"tool_calls":17,"tool_call_id":580,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"reasoning_content":17,"cogen_id":17,"ctime":17},"Updated file README.md (1605 characters)",{"file_path":36,"content_length":586,"is_update":11,"total_files":133,"file_size":587,"line_count":588},1605,3267,90,{"id":590,"role":92,"co
